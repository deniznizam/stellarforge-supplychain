name: StellarForge Full CI/CD Pipeline

on:
  push:
    branches: [ master, main, feat/* ]
  pull_request:
    branches: [ master, main ]

jobs:
  rust-contracts:
    name: Build & Test Soroban Smart Contracts
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        target: wasm32-unknown-unknown

    - name: Cargo Check
      run: cargo check

    - name: Run Contract Tests
      run: cargo test

  nextjs-frontend:
    name: Build & Test Next.js Frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps

    - name: Run Frontend Tests
      run: |
        cd frontend
        npm run test

    - name: Compile Frontend Build
      run: |
        cd frontend
        npm run build
